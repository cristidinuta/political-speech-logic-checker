<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LogicWatch — Political Speech Fallacy Detector</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#0d0d0d;--paper:#f5f0e8;--cream:#ede8dc;--rule:#c8b89a;--red:#c0392b;--gold:#b8860b;--blue:#1a3a5c;--green:#27ae60}
html{scroll-behavior:smooth}
body{background:var(--paper);color:var(--ink);font-family:'IBM Plex Sans',sans-serif;font-weight:300;min-height:100vh}
header{background:var(--ink);color:var(--paper);padding:2.5rem 3rem 2rem;position:relative;overflow:hidden}
header::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:repeating-linear-gradient(90deg,var(--red) 0 60px,var(--gold) 60px 120px,var(--blue) 120px 180px)}
.eyebrow{font-family:'IBM Plex Mono',monospace;font-size:.6rem;letter-spacing:.3em;color:var(--gold);margin-bottom:.6rem}
h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,5vw,3.5rem);font-weight:900;line-height:1;letter-spacing:-.02em}
h1 span{color:var(--red)}
.subtitle{font-size:.85rem;color:rgba(245,240,232,.55);margin-top:.5rem;font-weight:300;border-top:1px solid rgba(255,255,255,.1);padding-top:.6rem;max-width:60ch}
.pipeline{background:#1a1a1a;padding:.6rem 3rem;display:flex;gap:2rem;align-items:center;flex-wrap:wrap}
.pipe-step{display:flex;align-items:center;gap:.4rem;opacity:.3;transition:opacity .3s}
.pipe-step.active,.pipe-step.done{opacity:1}
.pipe-dot{width:8px;height:8px;border-radius:50%;background:#555;transition:background .3s,box-shadow .3s}
.pipe-step.active .pipe-dot{background:#f39c12;box-shadow:0 0 8px #f39c12}
.pipe-step.done .pipe-dot{background:var(--green)}
.pipe-label{font-family:'IBM Plex Mono',monospace;font-size:.6rem;letter-spacing:.15em;color:#888;transition:color .3s}
.pipe-step.active .pipe-label{color:#f39c12}
.pipe-step.done .pipe-label{color:var(--green)}
.pipe-status{font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:#666;margin-left:auto}
.layout{display:grid;grid-template-columns:1fr 1fr;min-height:calc(100vh - 155px)}
.panel-left{padding:2.5rem 2.5rem 2.5rem 3rem;border-right:1px solid var(--rule);display:flex;flex-direction:column;gap:1.25rem;position:sticky;top:0;height:calc(100vh - 155px);overflow-y:auto}
.panel-right{padding:2.5rem 3rem 2.5rem 2.5rem;overflow-y:auto;max-height:calc(100vh - 155px)}
.section-label{font-family:'IBM Plex Mono',monospace;font-size:.58rem;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:.75rem}
.section-label::after{content:'';flex:1;height:1px;background:var(--rule)}
textarea{flex:1;min-height:260px;background:var(--cream);border:1px solid var(--rule);border-radius:2px;padding:1rem;font-family:'IBM Plex Sans',sans-serif;font-size:.875rem;font-weight:300;line-height:1.7;color:var(--ink);resize:vertical;outline:none;transition:border-color .2s}
textarea:focus{border-color:var(--blue)}
textarea::placeholder{color:#aaa;font-style:italic}
.samples{display:flex;gap:.4rem;flex-wrap:wrap}
.sample-btn{font-family:'IBM Plex Mono',monospace;font-size:.62rem;letter-spacing:.08em;padding:.35rem .75rem;border:1px solid var(--rule);background:transparent;color:var(--ink);cursor:pointer;border-radius:2px;transition:all .15s}
.sample-btn:hover{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.analyze-btn{background:var(--ink);color:var(--paper);border:none;padding:.9rem 1.5rem;font-family:'IBM Plex Mono',monospace;font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;border-radius:2px;display:flex;align-items:center;justify-content:center;gap:.6rem;transition:background .2s}
.analyze-btn:hover:not(:disabled){background:var(--blue)}
.analyze-btn:disabled{background:#888;cursor:not-allowed}
.spinner{width:12px;height:12px;border:2px solid rgba(255,255,255,.25);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;display:none}
.loading .spinner{display:inline-block}
.error-box{display:none;background:#fdf0f0;border:1px solid var(--red);border-left:4px solid var(--red);padding:.75rem 1rem;font-family:'IBM Plex Mono',monospace;font-size:.7rem;color:var(--red);border-radius:2px;line-height:1.5}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:1rem;opacity:.3;text-align:center}
.empty-glyph{font-family:'Playfair Display',serif;font-size:5rem;line-height:1}
.empty-label{font-family:'IBM Plex Mono',monospace;font-size:.65rem;letter-spacing:.2em;text-transform:uppercase}
.summary-card{background:var(--ink);color:var(--paper);border-radius:2px;padding:1.25rem;display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin-bottom:1.5rem}
.stat{text-align:center;padding:.5rem 0;border-right:1px solid rgba(255,255,255,.1)}
.stat:last-child{border-right:none}
.stat-num{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:700;display:block;line-height:1}
.stat-num.danger{color:var(--red)}
.stat-lbl{font-family:'IBM Plex Mono',monospace;font-size:.52rem;letter-spacing:.18em;color:rgba(245,240,232,.45);margin-top:.25rem;display:block;text-transform:uppercase}
.tag-cloud{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1.5rem}
.ftag{font-family:'IBM Plex Mono',monospace;font-size:.62rem;padding:.28rem .65rem;border-radius:2px;color:white;letter-spacing:.04em}
.claims{display:flex;flex-direction:column;gap:.85rem}
.claim-card{border:1px solid var(--rule);border-radius:2px;overflow:hidden;animation:fadeUp .25s ease both}
.claim-card.bad{border-left:4px solid var(--red)}
.claim-card.good{border-left:4px solid var(--green)}
.claim-head{display:flex;align-items:flex-start;gap:.7rem;padding:.8rem 1rem;background:var(--cream);cursor:pointer}
.claim-num{font-family:'IBM Plex Mono',monospace;font-size:.62rem;color:var(--gold);min-width:1.8rem;padding-top:2px;flex-shrink:0}
.claim-text{font-size:.86rem;line-height:1.65;flex:1}
.claim-dots{display:flex;gap:.3rem;flex-wrap:wrap;padding-left:.5rem;flex-shrink:0;align-items:center}
.cdot{width:9px;height:9px;border-radius:50%;margin-top:2px}
.clean-tag{font-family:'IBM Plex Mono',monospace;font-size:.52rem;color:var(--green);letter-spacing:.05em}
.chevron{font-family:'IBM Plex Mono',monospace;font-size:.65rem;color:#aaa;margin-left:4px}
.claim-body{max-height:0;overflow:hidden;transition:max-height .3s ease}
.claim-card.open .claim-body{max-height:600px}
.claim-body-inner{padding:.6rem 1rem .9rem calc(1rem + 1.8rem + .7rem)}
.fallacy-row{display:grid;grid-template-columns:12px 1fr;gap:.6rem;padding-top:.65rem;margin-top:.65rem;border-top:1px solid #e0d8cc}
.fallacy-row:first-child{border-top:none;padding-top:.3rem;margin-top:0}
.fdot{width:10px;height:10px;border-radius:50%;margin-top:3px}
.fname{font-family:'IBM Plex Mono',monospace;font-size:.68rem;font-weight:600;letter-spacing:.05em;margin-bottom:.2rem}
.fexpl{font-size:.8rem;line-height:1.65;color:#555;font-weight:300}
.legend{margin-top:2rem;border-top:1px solid var(--rule);padding-top:1.25rem}
.legend-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.4rem 1.5rem;margin-top:.65rem}
.legend-row{display:flex;align-items:center;gap:.5rem;font-family:'IBM Plex Mono',monospace;font-size:.62rem}
.ldot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
@media(max-width:860px){.layout{grid-template-columns:1fr}.panel-left{position:static;height:auto;border-right:none;border-bottom:1px solid var(--rule);padding:1.5rem}.panel-right{max-height:none;padding:1.5rem}header,.pipeline{padding-left:1.5rem;padding-right:1.5rem}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<header>
  <p class="eyebrow">Formal Logic · Prolog Rule Reasoning · NLP</p>
  <h1>Logic<span>Watch</span></h1>
  <p class="subtitle">Paste a political speech. The system breaks it into atomic claims, classifies logical features, and Prolog rules surface any fallacies.</p>
</header>
<div class="pipeline">
  <div class="pipe-step" id="ps1"><div class="pipe-dot"></div><span class="pipe-label">1. Atomize</span></div>
  <div class="pipe-step" id="ps2"><div class="pipe-dot"></div><span class="pipe-label">2. Classify</span></div>
  <div class="pipe-step" id="ps3"><div class="pipe-dot"></div><span class="pipe-label">3. Prolog</span></div>
  <span class="pipe-status" id="pipeStatus"></span>
</div>
<div class="layout">
  <section class="panel-left">
    <p class="section-label">Input Speech</p>
    <textarea id="speechInput" rows="10" placeholder="Paste a political speech, excerpt, or argument here…"></textarea>
    <div>
      <p class="section-label" style="margin-bottom:.5rem">Load Sample</p>
      <div class="samples">
        <button class="sample-btn" onclick="loadSample('economy')">Economy</button>
        <button class="sample-btn" onclick="loadSample('immigration')">Immigration</button>
        <button class="sample-btn" onclick="loadSample('healthcare')">Healthcare</button>
      </div>
    </div>
    <div class="error-box" id="errorBox"></div>
    <button class="analyze-btn" id="analyzeBtn" onclick="analyze()">
      <div class="spinner" id="spinner"></div>
      <span id="btnText">Analyze Speech</span>
    </button>
  </section>
  <section class="panel-right" id="panelRight">
    <div class="empty-state" id="emptyState">
      <div class="empty-glyph">&#182;</div>
      <p class="empty-label">Awaiting speech input</p>
    </div>
    <div id="resultsContent" style="display:none"></div>
  </section>
</div>
<script>
const SAMPLES={
  economy:`My opponent was caught embezzling from his company twenty years ago, so nothing he says about tax policy can be trusted. Either we cut taxes immediately, or businesses will flee and unemployment will reach record highs. One economist from Harvard said our plan is perfect, and that settles the debate. Look at how crime has risen in this city — that is why we cannot afford any new spending programs.`,
  immigration:`Anyone who supports open borders simply wants to destroy this nation. We let in one undocumented worker, and soon the entire welfare system collapses and crime explodes everywhere. My opponent says immigrants should follow the law, which obviously means he wants to deport every single immigrant in the country. Studies show immigration is problematic — therefore we must close all borders immediately. Also, what about the pothole crisis downtown?`,
  healthcare:`A celebrity doctor endorsed our healthcare proposal on television, so the science is settled. If we allow any public option, within five years we will have full government control of every hospital. Either you support our plan completely, or you want people to die without coverage. My opponent's brother-in-law works for a pharmaceutical company, making everything she says about drug pricing corrupt.`,
};
const FALLACY_COLORS={"Ad Hominem":"#e74c3c","False Dilemma":"#e67e22","Slippery Slope":"#f39c12","Hasty Generalization":"#8e44ad","Straw Man":"#2980b9","Appeal to Authority":"#16a085","Red Herring":"#c0392b"};
function loadSample(k){document.getElementById('speechInput').value=SAMPLES[k];hideError()}
function showError(msg){const b=document.getElementById('errorBox');b.textContent='⚠ '+msg;b.style.display='block'}
function hideError(){document.getElementById('errorBox').style.display='none'}
function setPipeline(stage){
  const steps={atomizing:'ps1',classifying:'ps2',reasoning:'ps3'};
  const doneMap={classifying:['ps1'],reasoning:['ps1','ps2'],done:['ps1','ps2','ps3']};
  const msgs={atomizing:'Breaking into atomic claims…',classifying:'Classifying logical features…',reasoning:'Running Prolog rules…'};
  ['ps1','ps2','ps3'].forEach(id=>document.getElementById(id).classList.remove('active','done'));
  if(steps[stage])document.getElementById(steps[stage]).classList.add('active');
  (doneMap[stage]||[]).forEach(id=>document.getElementById(id).classList.add('done'));
  document.getElementById('pipeStatus').textContent=msgs[stage]||'';
}
function setLoading(on,msg='Analyze Speech'){
  const btn=document.getElementById('analyzeBtn');
  btn.disabled=on;btn.classList.toggle('loading',on);
  document.getElementById('spinner').style.display=on?'inline-block':'none';
  document.getElementById('btnText').textContent=msg;
}
async function analyze(){
  const speech=document.getElementById('speechInput').value.trim();
  if(!speech){showError('Please enter a speech to analyze.');return}
  hideError();setLoading(true,'Analyzing…');setPipeline('atomizing');
  const t1=setTimeout(()=>setPipeline('classifying'),4000);
  const t2=setTimeout(()=>setPipeline('reasoning'),10000);
  try{
    const res=await fetch('/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({speech})});
    clearTimeout(t1);clearTimeout(t2);
    const data=await res.json();
    if(!res.ok||data.error){showError(data.error||'Server error');setLoading(false);setPipeline('');return}
    setPipeline('done');setLoading(false,'Analyze Speech');renderResults(data);
  }catch(e){
    clearTimeout(t1);clearTimeout(t2);
    showError('Could not reach server. Please try again.');
    setLoading(false,'Analyze Speech');setPipeline('');
  }
}
function renderResults(data){
  document.getElementById('emptyState').style.display='none';
  const el=document.getElementById('resultsContent');el.style.display='block';
  const s=data.summary;
  const tagCloud=Object.entries(s.fallacy_counts).sort((a,b)=>b[1]-a[1]).map(([lbl,cnt])=>`<span class="ftag" style="background:${FALLACY_COLORS[lbl]||'#666'}">${lbl} ×${cnt}</span>`).join('');
  const claimsHtml=data.claims.map((c,i)=>{
    const bad=c.fallacies.length>0;
    const dots=bad?c.fallacies.map(f=>`<div class="cdot" title="${f.label}" style="background:${f.color}"></div>`).join(''):`<span class="clean-tag">✓ Clean</span>`;
    const rows=c.fallacies.map(f=>`<div class="fallacy-row"><div class="fdot" style="background:${f.color}"></div><div><div class="fname" style="color:${f.color}">${f.label}</div><div class="fexpl">${f.explanation}</div></div></div>`).join('');
    return `<div class="claim-card ${bad?'bad':'good'}" style="animation-delay:${i*40}ms" id="cc${c.id}"><div class="claim-head" onclick="toggle(${c.id},${bad})"><span class="claim-num">#${c.id}</span><span class="claim-text">${esc(c.text)}</span><div class="claim-dots">${dots}${bad?`<span class="chevron" id="chev${c.id}">▼</span>`:''}</div></div>${bad?`<div class="claim-body" id="cb${c.id}"><div class="claim-body-inner">${rows}</div></div>`:''}</div>`;
  }).join('');
  const legendHtml=Object.entries(FALLACY_COLORS).map(([lbl,col])=>`<div class="legend-row"><div class="ldot" style="background:${col}"></div>${lbl}</div>`).join('');
  el.innerHTML=`<div class="summary-card"><div class="stat"><span class="stat-num">${s.total_claims}</span><span class="stat-lbl">Atomic Claims</span></div><div class="stat"><span class="stat-num${s.claims_with_fallacies>0?' danger':''}">${s.claims_with_fallacies}</span><span class="stat-lbl">With Fallacies</span></div><div class="stat"><span class="stat-num${s.total_fallacies>0?' danger':''}">${s.total_fallacies}</span><span class="stat-lbl">Total Fallacies</span></div></div>${tagCloud?`<div class="tag-cloud">${tagCloud}</div>`:''}<p class="section-label" style="margin-bottom:1rem">Claim-by-Claim Analysis</p><div class="claims">${claimsHtml}</div><div class="legend"><p class="section-label">Fallacy Legend</p><div class="legend-grid">${legendHtml}</div></div>`;
  document.getElementById('panelRight').scrollTop=0;
}
function toggle(id,hasFallacy){
  if(!hasFallacy)return;
  const card=document.getElementById('cc'+id);
  const body=document.getElementById('cb'+id);
  const chev=document.getElementById('chev'+id);
  const open=card.classList.toggle('open');
  if(body)body.style.maxHeight=open?body.scrollHeight+'px':'0';
  if(chev)chev.textContent=open?'▲':'▼';
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
</script>
</body>
</html>
